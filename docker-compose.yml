services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: adproject
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adproject"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adproject?schema=public
      JWT_SECRET: change-this-to-a-strong-secret-in-production-please-0123456789
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    command: sh -c "npx prisma db push --skip-generate && npx ts-node prisma/seed.ts && node dist/server.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:5173"

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
